version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    # Este servicio solo construye, no necesita exponer puertos
    volumes:
      - frontend_dist:/frontend_dist
    # No necesita mantenerse vivo
    command: echo "Frontend built"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - frontend_dist:/app/dist
    ports:
      - "80:5000"
    depends_on:
      - frontend
      - decision-models-service

  decision-models-service:
    build:
      context: .
      dockerfile: Dockerfile.decision-models-service
    ports:
      - "7000:7000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:7000/health', timeout=3).read()
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  frontend_dist:
