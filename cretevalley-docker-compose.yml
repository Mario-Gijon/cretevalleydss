version: '3.8'

services:
  frontend:
    image: mariogijon/cretevalleydss_frontend:latest
    # Este servicio solo construye, no necesita exponer puertos
    volumes:
      - frontend_dist:/frontend_dist
    # No necesita mantenerse vivo
    command: echo "Frontend built"

  backend:
    image: mariogijon/cretevalleydss_backend:latest
    volumes:
      - frontend_dist:/app/dist
    ports:
      - "80:5000"
    depends_on:
      - frontend
      - decision-models-service

  decision-models-service:
    image: mariogijon/cretevalleydss_decision-models-service:latest
    ports:
      - "7000:7000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:7000/health', timeout=3).read()
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  frontend_dist:
