services:
  frontend:
    image: mariogijon/cretevalleydss_frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    image: mariogijon/cretevalleydss_backend:latest
    env_file:
      - ./Backend/.env.production
    environment:
      NODE_ENV: production
      PORT: 5000
      DECISION_MODELS_SERVICE_BASE_URL: http://decision-models-service:7000
    expose:
      - "5000"
    depends_on:
      - decision-models-service

  decision-models-service:
    image: mariogijon/cretevalleydss_decision-models-service:latest
    expose:
      - "7000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:7000/health', timeout=3).read()
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
