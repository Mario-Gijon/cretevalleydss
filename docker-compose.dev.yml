services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    working_dir: /app
    env_file:
      - ./Frontend/.env.development
    environment:
      - CHOKIDAR_USEPOLLING=true
    command:
      - sh
      - -lc
      - |
        if [ ! -d node_modules ] || [ -z "$(ls -A node_modules 2>/dev/null)" ]; then
          bun install --frozen-lockfile
        fi
        bun run dev --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.dev
    working_dir: /app
    env_file:
      - ./Backend/.env
    environment:
      - NODE_ENV=development
      - PORT=5000
      - ORIGIN_APIMODELS=http://apimodels:7000
      - ORIGIN_FRONT=http://localhost:5173
      - ORIGIN_BACK=http://localhost:5000
    command:
      - sh
      - -lc
      - |
        if [ ! -d node_modules ] || [ -z "$(ls -A node_modules 2>/dev/null)" ]; then
          bun install
        fi
        bun run dev
    ports:
      - "5000:5000"
    volumes:
      - ./Backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      - apimodels

  apimodels:
    build:
      context: .
      dockerfile: Dockerfile.apimodels.dev
    working_dir: /app
    command:
      - uvicorn
      - app:app
      - --host
      - 0.0.0.0
      - --port
      - "7000"
      - --reload
    ports:
      - "7000:7000"
    volumes:
      - ./ApiModels:/app

volumes:
  frontend_node_modules:
  backend_node_modules:
